<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
        <meta name="color-scheme" content="light dark">
        <link rel="stylesheet" href="css/index.css">
        <title>Etiquetas Bluetooth</title>
    </head>
    <body>
        <div class="app">

            <!-- Barra superior -->
            <header class="topbar">
                <div class="brand">
                    <span class="brand__mark" aria-hidden="true"></span>
                    <h1 class="brand__name">Etiquetas <em>BT</em></h1>
                </div>
                <span id="readyBadge" class="badge badge--wait">Conectando…</span>
            </header>

            <main class="stack">

                <!-- SIGNATURE: vista previa de la etiqueta -->
                <section class="card preview-card" aria-labelledby="previewTitle">
                    <h2 id="previewTitle" class="card__eyebrow">Vista previa</h2>
                    <div class="tag" id="tagPreview">
                        <p class="tag__title" id="tagTitle">PRODUCTO</p>
                        <div class="tag__bars" id="tagBars" aria-hidden="true"></div>
                        <p class="tag__code" id="tagCode">— sin código —</p>
                    </div>
                </section>

                <!-- Datos de la etiqueta -->
                <section class="card" aria-labelledby="dataTitle">
                    <h2 id="dataTitle" class="card__eyebrow">Datos de la etiqueta</h2>

                    <label class="field">
                        <span class="field__label">Título <small>(opcional)</small></span>
                        <input id="titleInput" class="field__input" type="text"
                               inputmode="text" autocomplete="off" maxlength="28"
                               placeholder="Ej. Camiseta algodón">
                    </label>

                    <label class="field">
                        <span class="field__label">Código</span>
                        <input id="codeInput" class="field__input" type="text"
                               inputmode="text" autocomplete="off" maxlength="40"
                               placeholder="Ej. 7501234567890">
                    </label>

                    <label class="field field--qty">
                        <span class="field__label">Cantidad</span>
                        <input id="qtyInput" class="field__input" type="number"
                               inputmode="numeric" min="1" max="99" step="1" value="1">
                    </label>

                    <button id="btnPrint" class="btn btn--primary" type="button">
                        Imprimir etiqueta
                    </button>
                </section>

                <!-- Impresora -->
                <section class="card" aria-labelledby="printerTitle">
                    <h2 id="printerTitle" class="card__eyebrow">Impresora</h2>
                    <p class="printer-current">
                        <span class="printer-current__label">Seleccionada:</span>
                        <strong id="printerName">Ninguna</strong>
                    </p>
                    <button id="btnScan" class="btn btn--ghost" type="button">
                        Buscar impresoras
                    </button>
                    <ul id="deviceList" class="device-list" hidden></ul>
                </section>

            </main>

            <!-- Estado / mensajes -->
            <div id="status" class="status" role="status" aria-live="polite" hidden></div>

        </div>

        <script src="cordova.js"></script>
        <script src="js/index.js"></script>
    </body>
</html>
