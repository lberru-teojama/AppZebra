<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Consulta de Facturas</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f6f9;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #0078d4;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0063b1;
        }

        #resultado {
            margin-top: 25px;
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background: #0078d4;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }
    </style>
</head>


<body>

    <div class="container">

        <div class="card">

            <h1>Consulta de Facturas</h1>

            <label for="txtFactura">Número de Factura</label>

            <input type="text"
                   id="txtFactura"
                   placeholder="Ingrese número de factura">

            <button id="btnBuscar" onclick="buscarFactura()">
                Buscar Factura
            </button>
        <br></br>
        <br>
             <button id="btnPrueba" onclick="buscarInfo()">
                Buscar Info
            </button>

            <div id="resultado">
                <table>
                    <thead>
                        <tr>
                            <th>Factura</th>
                            <th>Cantidad</th>
                            <th>Total</th>
                            <th>Opc</th>
                        </tr>
                    </thead>
                    <tbody id="detalleFactura">
                    </tbody>
                </table>

            </div>

        </div>

    </div>

    <script src="js/consultafactura.js"></script>


</body>
</html>
